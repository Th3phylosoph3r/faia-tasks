<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FAIA — Community Task Manager</title>
<meta name="description" content="Real-time collaborative task manager for the FAIA intentional land community in Portugal."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS — FAIA Natural Palette
═══════════════════════════════════════ */
:root {
  --cream:       #f5f2ec;
  --parchment:   #ede8de;
  --stone-light: #ddd8cf;
  --stone:       #b8b0a2;
  --stone-dark:  #7a7268;
  --sage-pale:   #e5ebe0;
  --sage:        #8fa882;
  --sage-dark:   #5c7a52;
  --taupe:       #c4b9a8;
  --earth:       #9c8c78;
  --earth-dark:  #6b5c48;
  --blush:       #e8ddd4;
  --text-primary:#3a3530;
  --text-muted:  #7a7268;
  --text-light:  #a89f94;

  /* status colours — muted naturals */
  --s-pending:   #d4c87a;
  --s-approved:  #8fa882;
  --s-priority:  #c4956a;
  --s-backlog:   #a8bec4;
  --s-progress:  #8fa882;
  --s-done:      #7a9e70;
  --s-rejected:  #c48a8a;

  --radius:   12px;
  --radius-sm: 6px;
  --shadow:   0 2px 12px rgba(58,53,48,0.08);
  --shadow-md:0 4px 24px rgba(58,53,48,0.12);
  --transition: 0.2s ease;
  --font-serif: 'Cormorant Garamond', serif;
  --font-sans:  'Outfit', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--cream);
  color:var(--text-primary);
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--parchment)}
::-webkit-scrollbar-thumb{background:var(--stone);border-radius:3px}

/* ── Typography ── */
h1,h2,h3,h4{font-family:var(--font-serif);font-weight:400;letter-spacing:0.02em}
h1{font-size:clamp(1.6rem,4vw,2.4rem);color:var(--text-primary)}
h2{font-size:clamp(1.2rem,3vw,1.7rem)}
h3{font-size:1.15rem}

/* ════════════════════════════════
   TOP BAR
════════════════════════════════ */
#topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(245,242,236,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--stone-light);
  padding:0 1.5rem;
  display:flex;align-items:center;gap:1rem;
  height:60px;
}
#topbar .logo{
  font-family:var(--font-serif);
  font-size:1.5rem;letter-spacing:0.12em;
  color:var(--sage-dark);font-weight:600;
  flex:0 0 auto;
}
#topbar .logo span{color:var(--earth);font-style:italic}
#topbar nav{display:flex;gap:0.25rem;flex:1;overflow-x:auto}
#topbar nav button{
  background:none;border:none;cursor:pointer;
  font-family:var(--font-sans);font-size:0.8rem;font-weight:500;
  color:var(--text-muted);
  padding:0.45rem 0.85rem;border-radius:var(--radius-sm);
  transition:all var(--transition);white-space:nowrap;
}
#topbar nav button:hover{background:var(--parchment);color:var(--text-primary)}
#topbar nav button.active{background:var(--sage-pale);color:var(--sage-dark);font-weight:600}
#user-pill{
  margin-left:auto;flex:0 0 auto;
  display:flex;align-items:center;gap:0.5rem;
}
#user-pill select{
  font-family:var(--font-sans);font-size:0.82rem;
  border:1px solid var(--stone-light);border-radius:20px;
  background:var(--parchment);color:var(--text-primary);
  padding:0.35rem 0.9rem;cursor:pointer;outline:none;
  transition:border-color var(--transition);
}
#user-pill select:focus{border-color:var(--sage)}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage),var(--earth));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:0.75rem;font-weight:600;
  flex:0 0 auto;
}
/* ── Language toggle ── */
#lang-toggle{
  display:flex;align-items:center;
  border:1px solid var(--stone-light);border-radius:20px;
  overflow:hidden;flex:0 0 auto;
}
#lang-toggle button{
  font-family:var(--font-sans);font-size:0.75rem;font-weight:600;
  border:none;background:none;cursor:pointer;
  padding:0.3rem 0.65rem;color:var(--text-muted);
  transition:all var(--transition);
}
#lang-toggle button.active{
  background:var(--sage-dark);color:#fff;
}

/* ════════════════════════════════
   MAIN LAYOUT
════════════════════════════════ */
#app{max-width:1280px;margin:0 auto;padding:1.5rem}
.page{display:none;animation:fadeIn 0.25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════════════════
   DASHBOARD
════════════════════════════════ */
.dash-hero{
  background:linear-gradient(135deg,var(--sage-pale) 0%,var(--parchment) 60%,var(--blush) 100%);
  border-radius:var(--radius);padding:2rem 2.5rem;margin-bottom:1.5rem;
  border:1px solid var(--stone-light);
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.dash-hero h1{line-height:1.2}
.dash-hero p{color:var(--text-muted);font-size:0.9rem;margin-top:0.35rem}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.25rem;margin-bottom:1.5rem}

.dash-section{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--stone-light);
  overflow:hidden;box-shadow:var(--shadow);
}
.dash-section-header{
  padding:1rem 1.25rem 0.75rem;
  border-bottom:1px solid var(--stone-light);
  display:flex;align-items:center;justify-content:space-between;
}
.dash-section-header h3{font-family:var(--font-serif);font-size:1.05rem}
.badge{
  font-size:0.7rem;font-weight:600;
  padding:0.2rem 0.55rem;border-radius:10px;
  background:var(--sage-pale);color:var(--sage-dark);
}
.dash-section-body{padding:0.75rem 1.25rem 1rem}

.mini-task{
  padding:0.65rem 0;
  border-bottom:1px solid var(--stone-light);
  display:flex;align-items:flex-start;gap:0.65rem;
}
.mini-task:last-child{border-bottom:none}
.mini-task .dot{
  width:8px;height:8px;border-radius:50%;flex:0 0 8px;margin-top:5px;
}
.mini-task .info{flex:1;min-width:0}
.mini-task .info strong{font-size:0.88rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-task .info span{font-size:0.76rem;color:var(--text-muted)}
.mini-task .chip{font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:8px;white-space:nowrap;flex:0 0 auto;margin-top:2px;background:var(--parchment);color:var(--text-muted)}
.empty-state{color:var(--text-light);font-size:0.85rem;padding:0.5rem 0;font-style:italic}

.activity-item{
  padding:0.55rem 0;border-bottom:1px solid var(--stone-light);
  font-size:0.82rem;color:var(--text-muted);
}
.activity-item:last-child{border-bottom:none}
.activity-item strong{color:var(--text-primary)}
.activity-item .ts{font-size:0.72rem;color:var(--text-light);display:block}

/* ════════════════════════════════
   TASK BOARD (Kanban)
════════════════════════════════ */
.board-controls{
  display:flex;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;
}
.board-controls input[type=text]{
  font-family:var(--font-sans);font-size:0.85rem;
  border:1px solid var(--stone-light);border-radius:var(--radius-sm);
  background:var(--parchment);color:var(--text-primary);
  padding:0.45rem 0.85rem;outline:none;flex:1;min-width:180px;
  transition:border-color var(--transition);
}
.board-controls input:focus{border-color:var(--sage)}
.board-controls select{
  font-family:var(--font-sans);font-size:0.82rem;
  border:1px solid var(--stone-light);border-radius:var(--radius-sm);
  background:var(--parchment);color:var(--text-primary);
  padding:0.45rem 0.75rem;outline:none;cursor:pointer;
}
.kanban{display:flex;gap:1rem;overflow-x:auto;padding-bottom:1rem}
.kanban-col{
  min-width:260px;flex:1;
  background:var(--parchment);border-radius:var(--radius);
  border:1px solid var(--stone-light);
  overflow:hidden;
}
.kanban-col-head{
  padding:0.8rem 1rem;
  font-family:var(--font-serif);font-size:1rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid transparent;
}
.kanban-col-head .count{font-family:var(--font-sans);font-size:0.75rem;
  font-weight:600;padding:0.15rem 0.5rem;border-radius:8px;background:rgba(255,255,255,0.6)}
.kanban-cards{padding:0.75rem;display:flex;flex-direction:column;gap:0.65rem;min-height:80px}

/* status colours applied as data attrs at runtime */
.col-pending .kanban-col-head{border-color:var(--s-pending)}
.col-priority .kanban-col-head{border-color:var(--s-priority)}
.col-backlog  .kanban-col-head{border-color:var(--s-backlog)}
.col-progress .kanban-col-head{border-color:var(--s-progress)}
.col-done     .kanban-col-head{border-color:var(--s-done)}
.col-rejected .kanban-col-head{border-color:var(--s-rejected)}

.task-card{
  background:#fff;border-radius:var(--radius-sm);
  border:1px solid var(--stone-light);
  padding:0.85rem 1rem;cursor:pointer;
  box-shadow:var(--shadow);
  transition:transform var(--transition),box-shadow var(--transition);
  position:relative;overflow:hidden;
}
.task-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--stone-light);
}
.task-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.task-card h4{font-family:var(--font-sans);font-size:0.88rem;font-weight:600;
  margin-bottom:0.3rem;padding-left:0.5rem}
.task-card .meta{display:flex;flex-wrap:wrap;gap:0.3rem;padding-left:0.5rem}
.tag{font-size:0.69rem;padding:0.1rem 0.45rem;border-radius:6px;
  background:var(--parchment);color:var(--text-muted);font-weight:500}
.tag.urgent{background:#fce9d4;color:#8a4a1a}
.tag.communal{background:var(--sage-pale);color:var(--sage-dark)}
.tag.personal{background:#ead9f5;color:#6b3d8a}
.vote-mini{font-size:0.72rem;color:var(--text-light);padding-left:0.5rem;margin-top:0.35rem}
.cost-tag{font-size:0.72rem;color:var(--earth-dark);font-weight:600;padding-left:0.5rem;margin-top:0.2rem}

/* ════════════════════════════════
   TASK DETAIL MODAL
════════════════════════════════ */
#modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(58,53,48,0.45);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem;overflow-y:auto;
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--cream);border-radius:var(--radius);
  border:1px solid var(--stone-light);
  width:100%;max-width:680px;
  box-shadow:var(--shadow-md);
  animation:fadeIn 0.2s ease;
}
#modal-header{
  padding:1.25rem 1.5rem;border-bottom:1px solid var(--stone-light);
  display:flex;align-items:flex-start;gap:1rem;
}
#modal-header h2{flex:1;font-family:var(--font-serif)}
#modal-header .close-btn{
  background:none;border:none;cursor:pointer;font-size:1.4rem;
  color:var(--text-muted);line-height:1;padding:0.1rem;
  transition:color var(--transition);
}
#modal-header .close-btn:hover{color:var(--text-primary)}
#modal-body{padding:1.25rem 1.5rem}

.modal-section{margin-bottom:1.5rem}
.modal-section h3{
  font-family:var(--font-sans);font-size:0.72rem;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);
  margin-bottom:0.75rem;padding-bottom:0.4rem;
  border-bottom:1px solid var(--stone-light);
}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.6rem}
.meta-item label{font-size:0.72rem;color:var(--text-muted);display:block}
.meta-item strong{font-size:0.88rem;color:var(--text-primary)}

/* Voting in modal */
.vote-grid{display:flex;flex-direction:column;gap:0.65rem}
.vote-row{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.6rem 0.85rem;border-radius:var(--radius-sm);
  background:var(--parchment);border:1px solid var(--stone-light);
}
.vote-row .vname{flex:1;font-size:0.85rem;font-weight:500}
.vote-btns{display:flex;gap:0.35rem}
.vote-btns button{
  font-size:0.72rem;font-family:var(--font-sans);font-weight:600;
  border:1px solid var(--stone-light);border-radius:var(--radius-sm);
  background:none;cursor:pointer;padding:0.25rem 0.65rem;
  transition:all var(--transition);
}
.vote-btns button.approve{color:var(--sage-dark)}
.vote-btns button.approve.sel{background:var(--sage-dark);color:#fff;border-color:var(--sage-dark)}
.vote-btns button.reject{color:var(--s-rejected)}
.vote-btns button.reject.sel{background:var(--s-rejected);color:#fff;border-color:var(--s-rejected)}
.vote-btns button.pyes{color:var(--s-priority)}
.vote-btns button.pyes.sel{background:var(--s-priority);color:#fff;border-color:var(--s-priority)}
.vote-btns button.pno{color:var(--text-muted)}
.vote-btns button.pno.sel{background:var(--stone);color:#fff;border-color:var(--stone)}
.vote-sep{width:1px;height:20px;background:var(--stone-light)}
.tally-bar{
  margin-top:0.65rem;padding:0.6rem 0.85rem;border-radius:var(--radius-sm);
  background:var(--cream);border:1px solid var(--stone-light);
  font-size:0.8rem;color:var(--text-muted);display:flex;gap:1.25rem;flex-wrap:wrap;
}
.tally-val{font-weight:600;color:var(--text-primary)}

/* Assignment */
.assign-form{display:flex;flex-wrap:wrap;gap:0.65rem;align-items:flex-end}
.field-group{display:flex;flex-direction:column;gap:0.3rem;min-width:120px}
.field-group label{font-size:0.72rem;color:var(--text-muted);font-weight:500}

/* Hours log */
.hours-entry{
  padding:0.55rem 0;border-bottom:1px solid var(--stone-light);
  display:grid;grid-template-columns:auto 1fr auto;gap:0.5rem;align-items:start;
}
.hours-entry:last-child{border-bottom:none}
.hours-entry .hw{font-size:0.82rem;font-weight:600}
.hours-entry .hn{font-size:0.78rem;color:var(--text-muted)}
.hours-entry .hh{font-size:0.82rem;color:var(--earth-dark);font-weight:600;white-space:nowrap}
.log-form{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:0.75rem;align-items:flex-end}

/* Activity log */
.activity-log{max-height:180px;overflow-y:auto}
.al-item{padding:0.45rem 0;border-bottom:1px solid var(--stone-light);font-size:0.8rem}
.al-item:last-child{border-bottom:none}
.al-item .alt{font-size:0.7rem;color:var(--text-light)}

/* Form inputs shared */
input[type=text],input[type=number],input[type=date],textarea,select{
  font-family:var(--font-sans);font-size:0.84rem;
  border:1px solid var(--stone-light);border-radius:var(--radius-sm);
  background:var(--parchment);color:var(--text-primary);
  padding:0.45rem 0.7rem;outline:none;width:100%;
  transition:border-color var(--transition),box-shadow var(--transition);
}
input:focus,textarea:focus,select:focus{
  border-color:var(--sage);
  box-shadow:0 0 0 3px rgba(143,168,130,0.15);
}
textarea{resize:vertical;min-height:80px}

/* Buttons */
.btn{
  font-family:var(--font-sans);font-size:0.82rem;font-weight:600;
  border:none;border-radius:var(--radius-sm);cursor:pointer;
  padding:0.5rem 1.1rem;transition:all var(--transition);white-space:nowrap;
}
.btn-primary{background:var(--sage-dark);color:#fff}
.btn-primary:hover{background:var(--earth-dark)}
.btn-secondary{background:var(--parchment);color:var(--text-primary);border:1px solid var(--stone-light)}
.btn-secondary:hover{background:var(--stone-light)}
.btn-sm{padding:0.35rem 0.75rem;font-size:0.76rem}
.btn-danger{background:#c48a8a;color:#fff}
.btn-danger:hover{background:#a06060}

/* ════════════════════════════════
   SUBMIT FORM PAGE
════════════════════════════════ */
.form-card{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--stone-light);
  max-width:680px;margin:0 auto;
  padding:2rem;box-shadow:var(--shadow);
}
.form-card h2{font-family:var(--font-serif);margin-bottom:1.5rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-full{margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:0.3rem}
.form-group label{font-size:0.78rem;font-weight:500;color:var(--text-muted)}
.form-group label span{color:var(--sage-dark)}
.radio-group{display:flex;gap:0.75rem;flex-wrap:wrap}
.radio-opt{display:flex;align-items:center;gap:0.35rem;font-size:0.84rem;cursor:pointer}
.radio-opt input[type=radio]{accent-color:var(--sage-dark)}

/* ════════════════════════════════
   HOUR BANK PAGE
════════════════════════════════ */
.hb-table-wrap{overflow-x:auto}
.hb-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.hb-table th{
  text-align:left;padding:0.7rem 1rem;
  background:var(--parchment);color:var(--text-muted);
  font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  border-bottom:2px solid var(--stone-light);
}
.hb-table td{padding:0.8rem 1rem;border-bottom:1px solid var(--stone-light)}
.hb-table tr:last-child td{border-bottom:none}
.hb-table tr:hover td{background:var(--sage-pale)}
.hb-bar{height:8px;border-radius:4px;background:var(--sage-pale);margin-top:4px}
.hb-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--sage),var(--earth));transition:width 0.5s ease}
.hb-total{font-weight:600;font-size:1.05rem;color:var(--sage-dark)}

/* ════════════════════════════════
   STATUS CHIPS
════════════════════════════════ */
.status-chip{
  font-size:0.7rem;font-weight:600;letter-spacing:0.04em;
  padding:0.2rem 0.6rem;border-radius:10px;display:inline-block;
}
.st-pending  {background:#fdf8d8;color:#7a6a10}
.st-approved {background:var(--sage-pale);color:var(--sage-dark)}
.st-priority {background:#fce9d4;color:#7a4210}
.st-backlog  {background:#d8e8f0;color:#336080}
.st-progress {background:#d8e8d8;color:#2a5a2a}
.st-done     {background:#d0e8c8;color:#205020}
.st-rejected {background:#f0d8d8;color:#7a2020}

/* ════════════════════════════════
   NOTIFICATIONS / TOASTS
════════════════════════════════ */
#toast-container{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:500;
  display:flex;flex-direction:column;gap:0.5rem;
}
.toast{
  background:#fff;border:1px solid var(--stone-light);
  border-left:4px solid var(--sage-dark);
  border-radius:var(--radius-sm);padding:0.75rem 1rem;
  font-size:0.82rem;box-shadow:var(--shadow-md);
  animation:slideIn 0.25s ease;max-width:300px;
}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.error{border-left-color:var(--s-rejected)}

/* ════════════════════════════════
   LOADING / OFFLINE
════════════════════════════════ */
#loading-screen{
  position:fixed;inset:0;background:var(--cream);z-index:1000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
}
.spinner{
  width:40px;height:40px;border:3px solid var(--stone-light);
  border-top-color:var(--sage-dark);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

function toast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error'?' error':'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

function fmtDate(ts){
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function statusClass(s){ return 'st-'+s; }

function getVoteTally(task){
  const votes = task.votes || {};
  let ap=0,rj=0,py=0,pn=0;
  MEMBERS.forEach(m=>{
    const v = votes[m];
    if(!v) return;
    if(v.approve==='approve') ap++;
    if(v.approve==='reject')  rj++;
    if(v.priority==='yes')    py++;
    if(v.priority==='no')     pn++;
  });
  return {ap,rj,py,pn};
}

function computeStatus(task){
  // re-derive status from votes if still in pending
  if(task.status !== 'pending') return task.status;
  const {ap,rj} = getVoteTally(task);
  const total = ap+rj;
  if(ap >= 3){
    const {py,pn} = getVoteTally(task);
    return py >= 3 ? 'priority' : 'backlog';
  }
  if(rj >= 3) return 'rejected';
  return 'pending';
}

function avatarLetter(name){ return name ? name[0].toUpperCase() : '?'; }

  const q = query(collection(db,'tasks'), orderBy('submittedAt','desc'));
  onSnapshot(q, snap => {
    allTasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
    document.getElementById('loading-screen').style.display='none';
  }, err=>{
    console.error(err);
    document.getElementById('loading-screen').innerHTML=
      `<p style="color:#c48a8a;font-family:var(--font-serif)">${t('firestore_error').replace('\\n','<br>')}</p>`;
  });
}

  const voteList = document.getElementById('dash-vote-list');
  const needVote = currentUser
    ? allTasks.filter(t=>t.status==='pending' && !(t.votes||{})[currentUser]?.approve)
    : [];
  document.getElementById('badge-vote').textContent = needVote.length;
  if(!needVote.length){ voteList.innerHTML=`<p class="empty-state">${t('all_caught_up')}</p>`; }
  else {
    voteList.innerHTML = needVote.map(t=>`
      <div class="mini-task" data-tid="${t.id}" style="cursor:pointer" onclick="window._openTask('${t.id}')">
        <div class="dot" style="background:var(--s-pending)"></div>
        <div class="info">
          <strong>${escHtml(t.title)}</strong>
          <span>${t.category||''} · ${fmtDate(t.submittedAt)}</span>
        </div>
        <span class="chip">${t.urgency||''}</span>
      </div>`).join('');
  }

  // assigned to me
  const assList = document.getElementById('dash-assigned-list');
  const assigned = currentUser
    ? allTasks.filter(t=>t.assignedTo===currentUser && t.status!=='done' && t.status!=='rejected')
    : [];
  document.getElementById('badge-assigned').textContent = assigned.length;
  if(!assigned.length){ assList.innerHTML=`<p class="empty-state">${t('nothing_assigned')}</p>`; }
  else {
    assList.innerHTML = assigned.map(t=>`
      <div class="mini-task" style="cursor:pointer" onclick="window._openTask('${t.id}')">
        <div class="dot" style="background:var(--s-${t.status})"></div>
        <div class="info">
          <strong>${escHtml(t.title)}</strong>
          <span>${t.category||''}</span>
        </div>
        <span class="chip status-chip ${statusClass(t.status)}">${statusLabel(t.status)}</span>
      </div>`).join('');
  }

  // recent activity — aggregate from all tasks
  const acts = [];
  allTasks.forEach(t=>{
    (t.activityLog||[]).forEach(a=>acts.push({...a,taskTitle:t.title,taskId:t.id}));
  });
  acts.sort((a,b)=>{
    const ta = a.timestamp?.toMillis?.() || 0;
    const tb = b.timestamp?.toMillis?.() || 0;
    return tb - ta;
  });
  const actEl = document.getElementById('dash-activity');
  if(!acts.length){ actEl.innerHTML=`<p class="empty-state">${t('no_activity')}</p>`; return; }
  actEl.innerHTML = acts.slice(0,20).map(a=>`
    <div class="activity-item">
      <strong>${escHtml(a.actor||'?')}</strong> ${escHtml(a.action||'')}
      — <em style="font-size:0.8rem">${escHtml(a.taskTitle||'')}</em>
      <span class="ts">${fmtTime(a.timestamp)}</span>
    </div>`).join('');
}

// ── BOARD ───────────────────────────────────────────────────
function renderBoard(){
  const search   = (document.getElementById('board-search')?.value||'').toLowerCase();
  const filterCat= document.getElementById('board-filter-cat')?.value||'';
  const filterBen= document.getElementById('board-filter-benefit')?.value||'';

  let tasks = allTasks;
  if(search)     tasks = tasks.filter(t=>(t.title+t.description).toLowerCase().includes(search));
  if(filterCat)  tasks = tasks.filter(t=>t.category===filterCat);
  if(filterBen)  tasks = tasks.filter(t=>t.benefitType===filterBen);

  const cols = ['pending','priority','backlog','progress','done','rejected'];
  const board = document.getElementById('kanban-board');
  board.innerHTML = cols.map(st=>{
    const cards = tasks.filter(t=>{
      const eff = computeStatus(t);
      return st==='pending' ? eff==='pending' : t.status===st;
    });
    return `
    <div class="kanban-col col-${st}">
      <div class="kanban-col-head">
        <span>${statusLabel(st)}</span>
        <span class="count">${cards.length}</span>
      </div>
      <div class="kanban-cards" id="col-${st}">
        ${cards.map(t=>taskCard(t)).join('')}
        ${cards.length===0?`<div style="color:var(--text-light);font-size:0.78rem;padding:0.5rem;font-style:italic">${t('col_empty')}</div>`:''}
      </div>
    </div>`;
  }).join('');

  // attach click handlers
  board.querySelectorAll('.task-card').forEach(el=>{
    el.addEventListener('click',()=>window._openTask(el.dataset.tid));
  });
}

function taskCard(t){
  const {ap,rj} = getVoteTally(t);
  const eff = computeStatus(t);
  const urgCol = t.urgency==='Urgent'?'var(--s-priority)':'var(--sage)';
  return `<div class="task-card" data-tid="${t.id}" style="--card-border:${urgCol}">
    <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${urgCol};border-radius:2px 0 0 2px"></div>
    <h4>${escHtml(t.title)}</h4>
    <div class="meta">
      ${t.category?`<span class="tag">${CAT_ICONS[t.category]||'◦'} ${escHtml(t.category)}</span>`:''}
      ${t.urgency==='Urgent'?`<span class="tag urgent">⚡ ${t('urgent')}</span>`:''}
      ${t.benefitType?`<span class="tag ${t.benefitType.toLowerCase()}">${t.benefitType==='Communal'?t('communal'):t('personal')}</span>`:''}
    </div>
    ${t.estimatedCost?`<div class="cost-tag">€${Number(t.estimatedCost).toFixed(2)}</div>`:''}
    ${t.status==='pending'?`<div class="vote-mini">✓ ${ap} · ✗ ${rj} · ${5-ap-rj} ${t('vote_pending_count')}</div>`:''}
    ${t.assignedTo?`<div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.3rem;padding-left:0.5rem">👤 ${escHtml(t.assignedTo)}</div>`:''}

}

// ── HOUR BANK ───────────────────────────────────────────────
function renderHourBank(){
  const totals = {};
  MEMBERS.forEach(m=>totals[m]=0);
  allTasks.forEach(t=>{
    (t.hoursLog||[]).forEach(h=>{
      if(totals[h.member]!==undefined) totals[h.member]+=Number(h.hours)||0;

  const tbody = document.getElementById('hb-tbody');
  tbody.innerHTML = MEMBERS.map(m=>`
    <tr>
      <td style="display:flex;align-items:center;gap:0.6rem">

}

window._castVote = async function(taskId, member, field, value){
  if(!currentUser){ toast(t('toast_select_user'),'error'); return; }
  if(member !== currentUser){ return; }
  try{
    const task = allTasks.find(t=>t.id===taskId);
    if(!task) return;
    const votes = structuredClone(task.votes||{});
    if(!votes[member]) votes[member]={};
    votes[member][field] = value;

    const actLog = structuredClone(task.activityLog||[]);
    actLog.push({
      timestamp: new Date(),
      actor: currentUser,
      action: `voted ${field==='approve'?value:'priority='+value} on this task`
    });

    // compute new status
    let newStatus = task.status;
    const ap = MEMBERS.filter(m=>votes[m]?.approve==='approve').length;
    const rj = MEMBERS.filter(m=>votes[m]?.approve==='reject').length;
    if(task.status==='pending'){
      if(ap>=3){
        const py = MEMBERS.filter(m=>votes[m]?.priority==='yes').length;
        newStatus = py>=3?'priority':'backlog';
        if(newStatus!==task.status) actLog.push({timestamp:new Date(),actor:'System',action:`Task moved to ${statusLabel(newStatus)}`});
      }
      if(rj>=3){
        newStatus='rejected';
        actLog.push({timestamp:new Date(),actor:'System',action:'Task rejected by majority vote'});
      }
    }

    await updateDoc(doc(db,'tasks',taskId),{
      votes, activityLog:actLog, status:newStatus
    });
    toast(t('toast_vote'));
  }catch(e){ toast('Error: '+e.message,'error'); }
};

window._logHours = async function(taskId){

  document.getElementById('user-avatar').textContent = avatarLetter(currentUser);
  renderAll();
});

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){ return escHtml(s); }
